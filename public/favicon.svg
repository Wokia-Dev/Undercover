<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Gradients pour les effets néon et reflets -->
    <linearGradient id="civilGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="undercoverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#7e22ce" />
    </linearGradient>
    <linearGradient id="hatGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    
    <!-- Filtre de lueur pour le côté Premium / Néon -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Fond optionnel pour l'icône de l'application (Style Glassmorphism sombre) -->
  <rect width="512" height="512" rx="110" fill="#0b0f19" />
  
  <!-- Groupe central contenant le logo d'espion -->
  <g transform="translate(0, 15)">
    <!-- Le Chapeau (Fedora Noir/Bleu Nuit) -->
    <path d="M 160,200 
             C 170,130 210,120 256,120 
             C 302,120 342,130 352,200 
             Z" 
          fill="url(#hatGrad)" />
          
    <!-- Ruban du chapeau (Gris Anthracite) -->
    <path d="M 162,190 C 210,185 302,185 350,190 L 352,201 C 302,196 210,196 160,201 Z" fill="#334155" />
    
    <!--Bord du chapeau -->
    <path d="M 100,200 C 180,215 332,215 412,200 C 425,198 425,208 412,212 C 332,230 180,230 100,212 C 87,208 87,198 100,200 Z" fill="url(#hatGrad)" />

    <!-- Les Lunettes d'Agent Secret (Symbole des rôles) -->
    <g filter="url(#glow)">
      <!-- Verre Civil (Gauche - Vert) -->
      <path d="M 150,250 L 225,250 L 215,310 L 160,310 Z" fill="url(#civilGrad)" opacity="0.95" />
      <path d="M 165,260 L 210,260 L 203,295 L 172,295 Z" fill="#ffffff" opacity="0.2" /> <!-- Reflet -->

      <!-- Verre Undercover (Droite - Violet) -->
      <path d="M 287,250 L 362,250 L 352,310 L 297,310 Z" fill="url(#undercoverGrad)" opacity="0.95" />
      <path d="M 302,260 L 347,260 L 340,295 L 309,295 Z" fill="#ffffff" opacity="0.2" /> <!-- Reflet -->
      
      <!-- Pont de lunettes / Mr. White (Milieu - Blanc brillant) -->
      <rect x="225" y="254" width="62" height="10" rx="3" fill="#f8fafc" />
    </g>
    
    <!-- Petit clin d'oeil : un point d'interrogation subtil formé par les ombres sous les lunettes (Optionnel) -->
    <circle cx="256" cy="350" r="6" fill="#64748b" opacity="0.5" />
  </g>
</svg>